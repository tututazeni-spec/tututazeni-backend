name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    services:
      postgres:
        image: postgres:16
        env:
          # Tem de coincidir com o DATABASE_URL do .env.test, que os testes
          # de integração carregam com override
          POSTGRES_PASSWORD: 'Placido*7'
          POSTGRES_DB: innova_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Gerar cliente Prisma
        run: npx prisma generate

      - name: Verificar lint
        run: npm run lint:check

      - name: Verificar formatação
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Aplicar migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: 'postgresql://postgres:Placido*7@localhost:5432/innova_test'

      - name: Cobertura de código
        run: npm run test:coverage
        env:
          DATABASE_URL: 'postgresql://postgres:Placido*7@localhost:5432/innova_test'

      - name: Testes de integração
        run: npm run test:integration
        env:
          DATABASE_URL: 'postgresql://postgres:Placido*7@localhost:5432/innova_test'

      - name: Análise SonarCloud
        # Só corre se o segredo SONAR_TOKEN estiver configurado no repositório.
        # Sem isto, o passo falharia em repositórios sem SonarCloud ligado.
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
